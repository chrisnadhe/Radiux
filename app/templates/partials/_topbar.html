{# ── Radiux Topbar ── #}
<header class="flex-shrink-0 flex items-center justify-between h-16 px-6 bg-slate-900 border-b border-slate-800">

    {# Left: sidebar toggle + page title #}
    <div class="flex items-center gap-4">
        <button @click="sidebarOpen = !sidebarOpen"
                class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
                aria-label="Toggle sidebar">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <h1 class="text-base font-semibold text-white">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>

    {# Right: user info + logout #}
    <div class="flex items-center gap-3">
        {# Status indicator #}
        <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-emerald-500/10 border border-emerald-500/30 rounded-full">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
            <span class="text-xs text-emerald-400 font-medium">Online</span>
        </div>

        {# User dropdown #}
        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open"
                    class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors">
                <div class="w-7 h-7 rounded-full bg-brand-600 flex items-center justify-center flex-shrink-0">
                    <span class="text-xs font-bold text-white">
                        {{ current_user.username[0].upper() if current_user else 'A' }}
                    </span>
                </div>
                <div class="hidden sm:block text-left">
                    <p class="text-sm font-medium text-white leading-tight">
                        {{ current_user.username if current_user else 'Admin' }}
                    </p>
                    <p class="text-xs text-slate-500 leading-tight capitalize">
                        {{ current_user.role if current_user else 'superadmin' }}
                    </p>
                </div>
                <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            {# Dropdown menu #}
            <div x-show="open"
                 @click.away="open = false"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="absolute right-0 top-full mt-2 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl py-1 z-50">
                <div class="px-4 py-2 border-b border-slate-700">
                    <p class="text-xs text-slate-400">Logged in as</p>
                    <p class="text-sm font-semibold text-white truncate">{{ current_user.username if current_user else 'Admin' }}</p>
                </div>
                <a href="/logout-redirect"
                   class="flex items-center gap-2 px-4 py-2.5 text-sm text-red-400 hover:bg-red-500/10 transition-colors w-full">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </a>
            </div>
        </div>
    </div>

</header>
