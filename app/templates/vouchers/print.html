<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Vouchers - Batch #{{ batch_id }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .page-break { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-8 text-slate-800 print:p-0 print:bg-white">
    
    <div class="max-w-5xl mx-auto mb-8 print:hidden flex justify-between items-end gap-4">
        <div>
            <h1 class="text-2xl font-bold">Print Vouchers Batch #{{ batch_id }}</h1>
            <p class="text-gray-500">Gunakan Ctrl+P atau Command+P untuk mencetak</p>
        </div>
        <div class="flex items-center gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Hotspot Login URL</label>
                <input type="text" id="loginUrlInput" value="http://hotspot.local" onkeyup="updateLoginUrl(this.value)" class="px-3 py-2 border border-gray-300 rounded text-sm w-64 focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <button onclick="window.print()" class="px-6 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 h-[38px] flex items-center mt-5">
                Print Sekarang
            </button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto bg-white p-4 shadow-sm print:shadow-none print:p-0">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 print:gap-2">
            {% for voucher in vouchers %}
            <div class="border-2 border-dashed border-gray-300 p-4 rounded-lg page-break relative text-center">
                <div class="font-bold text-lg mb-2 text-indigo-600">RADIUX HOTSPOT</div>
                <div class="text-xs text-gray-500 mb-1">Username</div>
                <div class="font-mono text-xl font-bold bg-gray-100 py-1 rounded">{{ voucher.radius_username }}</div>
                <div class="text-xs text-gray-500 mt-2 mb-1">Password</div>
                <div class="font-mono text-lg font-bold bg-gray-100 py-1 rounded">{{ voucher.voucher_password }}</div>
                <div class="text-xs text-gray-400 mt-3 border-t pt-2">Login: <span class="login-url-display">http://hotspot.local</span></div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function updateLoginUrl(value) {
            const displays = document.querySelectorAll('.login-url-display');
            displays.forEach(el => {
                el.textContent = value;
            });
        }
    </script>
</body>
</html>
