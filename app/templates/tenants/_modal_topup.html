<div id="topup-modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 overflow-y-auto"
     x-data="{ show: false }"
     x-init="setTimeout(() => show = true, 50)"
     x-show="show"
     x-transition.opacity.duration.200ms>
     
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-sm shadow-2xl relative"
         @click.away="show = false; setTimeout(() => $el.closest('#topup-modal').remove(), 200)"
         x-show="show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">
         
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-800">
            <h3 class="text-lg font-bold text-white">Topup Saldo</h3>
            <button type="button" @click="show = false; setTimeout(() => $el.closest('#topup-modal').remove(), 200)" class="text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <form hx-post="/api/v1/tenants/{{ tenant.id }}/topup"
              hx-ext="json-enc"
              hx-on::after-request="if(event.detail.successful) { window.location.reload(); }"
              class="p-6 space-y-5">
            
            <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                <p class="text-xs text-slate-400 mb-1">Reseller</p>
                <p class="text-sm font-semibold text-white">{{ tenant.name }}</p>
                
                <p class="text-xs text-slate-400 mt-3 mb-1">Saldo Saat Ini</p>
                <p class="text-lg font-bold text-emerald-400">Rp{{ "{:,.0f}".format(tenant.balance) }}</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Jumlah Topup (Rp)</label>
                <input type="number" name="amount" required min="1" step="1"
                       class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-white text-sm focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 placeholder-slate-500 font-mono"
                       placeholder="100000" />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Catatan (Opsional)</label>
                <input type="text" name="notes"
                       class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-white text-sm focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 placeholder-slate-500"
                       placeholder="Via Transfer Bank..." />
            </div>

            <div class="pt-2 flex justify-end gap-3">
                <button type="button" @click="show = false; setTimeout(() => $el.closest('#topup-modal').remove(), 200)"
                        class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-colors">
                    Batal
                </button>
                <button type="submit"
                        class="px-4 py-2 text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-500 rounded-xl transition-colors shadow-lg shadow-emerald-500/20">
                    Proses Topup
                </button>
            </div>
        </form>
    </div>
</div>
