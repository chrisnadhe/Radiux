{% extends "base.html" %}

{% block title %}Audit Logs — Radiux{% endblock %}

{% block content %}
<div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Audit Logs</h1>
        <p class="text-sm text-slate-400 mt-1">Pantau semua aktivitas sistem dari tabel audit_logs.</p>
    </div>
</div>

<div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-sm">
    <div class="p-4 border-b border-slate-800 flex flex-col sm:flex-row gap-4 items-center justify-between bg-slate-800/50">
        <div class="w-full sm:w-72">
            <label for="search-action" class="sr-only">Filter Action</label>
            <div class="relative">
                <input type="text"
                       id="search-action"
                       placeholder="Filter action (e.g., LOGIN_SUCCESS)..."
                       class="w-full bg-slate-900 border border-slate-700 text-sm rounded-xl px-4 py-2 text-white placeholder-slate-500 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors"
                       hx-get="/ui/audit/table"
                       hx-trigger="keyup changed delay:500ms"
                       hx-target="#table-container"
                       name="action" />
            </div>
        </div>
        <button hx-get="/ui/audit/table"
                hx-target="#table-container"
                class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-medium border border-slate-700 rounded-xl transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Refresh
        </button>
    </div>

    <div id="table-container"
         hx-get="/ui/audit/table"
         hx-trigger="load"
         class="overflow-x-auto min-h-[300px] relative">
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="spinner"></div>
        </div>
    </div>
</div>

{% endblock %}
