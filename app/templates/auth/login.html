<!DOCTYPE html>
<html lang="id" class="h-full dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login Radiux — Panel Admin FreeRADIUS" />
    <title>Login — Radiux</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/custom.css" />
</head>
<body class="h-full bg-slate-950 font-sans antialiased flex items-center justify-center p-4">

    {# Background grid pattern #}
    <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=%2260%22 height=%2260%22 viewBox=%220 0 60 60%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cg fill=%22none%22 fill-rule=%22evenodd%22%3E%3Cg fill=%22%23ffffff%22 fill-opacity=%220.02%22%3E%3Cpath d=%22M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z%22/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-50"></div>

    {# Glow effects #}
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-brand-600/10 rounded-full blur-3xl pointer-events-none"></div>

    {# Login card #}
    <div class="relative w-full max-w-md">

        {# Header #}
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-600 mb-4 shadow-lg shadow-brand-600/30">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Radiux</h1>
            <p class="text-slate-400 mt-1.5 text-sm">FreeRADIUS Management Panel</p>
        </div>

        {# Card #}
        <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Masuk ke Akun</h2>

            {# Error message area #}
            <div id="login-error" class="mb-4"></div>

            {# Form — submit via HTMX to API JSON #}
            <form id="login-form"
                  hx-post="/api/v1/auth/login"
                  hx-target="#login-error"
                  hx-swap="innerHTML"
                  hx-ext="json-enc"
                  class="space-y-5">

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                    <input type="text"
                           id="username"
                           name="username"
                           autocomplete="username"
                           required
                           placeholder="admin"
                           class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500
                                  text-sm focus:border-brand-500 transition-colors" />
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password"
                               id="password"
                               name="password"
                               autocomplete="current-password"
                               required
                               placeholder="••••••••"
                               class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500
                                      text-sm focus:border-brand-500 transition-colors pr-10" />
                        <button type="button"
                                onclick="togglePassword()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                            <svg id="eye-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="w-full py-2.5 px-4 bg-brand-600 hover:bg-brand-500 text-white font-semibold rounded-xl
                               transition-colors shadow-lg shadow-brand-600/20 flex items-center justify-center gap-2">
                    <span class="htmx-indicator spinner"></span>
                    <span>Masuk</span>
                </button>

            </form>
        </div>

        <p class="text-center text-xs text-slate-600 mt-6">
            Radiux v{{ app_version }} &mdash; FreeRADIUS Management
        </p>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Handle login success/error
        document.getElementById('login-form').addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.xhr.status === 200) {
                // Sukses — redirect ke dashboard
                window.location.href = '/';
            } else {
                // Error — tampilkan pesan
                let msg = 'Username atau password salah';
                try {
                    const resp = JSON.parse(evt.detail.xhr.responseText);
                    msg = resp.detail || msg;
                } catch {}
                document.getElementById('login-error').innerHTML = `
                    <div class="flex items-center gap-2 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <span>${msg}</span>
                    </div>`;
            }
        });
    </script>
</body>
</html>
