# ===========================================================================
# alembic.ini — Konfigurasi Alembic untuk Radiux
# ===========================================================================

[alembic]
# Path ke folder migrasi (relatif dari root proyek)
script_location = migrations

# Template untuk nama file revisi
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(rev)s_%%(slug)s

# Gunakan timezone UTC untuk timestamp revisi
timezone = UTC

# Encoding file migrasi
output_encoding = utf-8

# Database URL — dibaca dari environment variable DATABASE_URL.
# Jika tidak ada, Alembic akan error dan meminta env var.
# Di production, set via env; untuk dev lokal set di .env
sqlalchemy.url =

# ---------------------------------------------------------------------------
# Logging — ikuti standard Python logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
