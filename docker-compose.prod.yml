# ===========================================================================
# docker-compose.prod.yml — Production overrides
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ===========================================================================

services:

  app:
    # Production: tidak ada bind mount, gunakan image yang sudah di-build
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --no-access-log
    environment:
      DEBUG: "false"
      APP_ENV: production
    # Tidak expose port langsung ke host di production — lewat nginx
    ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  freeradius:
    command: freeradius -f -l stdout
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + TLS termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: radiux_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      app:
        condition: service_started
    networks:
      - radiux_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # SSL Init — Generate Self-Signed Cert otomatis jika belum ada
  # ---------------------------------------------------------------------------
  ssl-init:
    image: alpine/openssl
    container_name: radiux_ssl_init
    volumes:
      - nginx_ssl:/etc/nginx/ssl
    command: >
      sh -c "
      if [ ! -f /etc/nginx/ssl/nginx.crt ]; then
        echo 'Generating self-signed certificate...';
        openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/ssl/nginx.key -out /etc/nginx/ssl/nginx.crt -subj '/C=ID/ST=Local/L=Local/O=Radiux/CN=localhost';
      else
        echo 'Certificate already exists.';
      fi"

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: radiux_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - radiux_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Grafana — Metrics Dashboard
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: radiux_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=$${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - radiux_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx_ssl:
  prometheus_data:
  grafana_data:
