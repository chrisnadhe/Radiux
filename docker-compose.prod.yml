# ===========================================================================
# docker-compose.prod.yml — Production overrides
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ===========================================================================

services:

  app:
    # Production: tidak ada bind mount, gunakan image yang sudah di-build
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --no-access-log
    environment:
      DEBUG: "false"
      APP_ENV: production
    # Tidak expose port langsung ke host di production — lewat nginx
    ports: []

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + TLS termination (Phase 11)
  # Uncomment saat Phase 11 (Deployment & DevOps) selesai
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: radiux_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - radiux_net

  # ---------------------------------------------------------------------------
  # FreeRADIUS production mode (tanpa debug -X)
  # ---------------------------------------------------------------------------
  freeradius:
    command: freeradius -f -l stdout
