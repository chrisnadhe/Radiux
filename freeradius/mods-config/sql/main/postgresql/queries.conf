## Query config for rlm_sql — PostgreSQL backend
## File ini digunakan oleh FreeRADIUS module rlm_sql
## Jangan ubah nama tabel/kolom tanpa memperbarui schema.sql

authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM radcheck \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM radreply \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_group_check_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM radgroupcheck \
    WHERE groupname = '%{${group_attribute}}' \
    ORDER BY id"

authorize_group_reply_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM radgroupreply \
    WHERE groupname = '%{${group_attribute}}' \
    ORDER BY id"

group_membership_query = "\
    SELECT groupname \
    FROM radusergroup \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY priority"

## Accounting queries
accounting_onoff_query = "\
    UPDATE radacct \
    SET acctstoptime = TO_TIMESTAMP('%{integer:Event-Timestamp}'), \
        acctsessiontime = '%{integer:Event-Timestamp}' - EXTRACT(EPOCH FROM acctstarttime)::INTEGER, \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        acctupdatetime = NOW() \
    WHERE nasipaddress = '%{NAS-IP-Address}' \
    AND acctstoptime IS NULL"

accounting_start_query = "\
    INSERT INTO radacct \
        (acctsessionid, acctuniqueid, username, groupname, realm, nasipaddress, \
         nasportid, nasporttype, acctstarttime, acctupdatetime, acctsessiontime, \
         acctauthentic, connectinfo_start, acctinputoctets, acctoutputoctets, \
         calledstationid, callingstationid, acctterminatecause, servicetype, \
         framedprotocol, framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
         '%{${group_attribute}}', '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port-Id}', \
         '%{NAS-Port-Type}', TO_TIMESTAMP('%{integer:Event-Timestamp}'), \
         NOW(), '0', '%{Acct-Authentic}', '%{Connect-Info}', '0', '0', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', '', '%{Service-Type}', \
         '%{Framed-Protocol}', NULLIF('%{Framed-IP-Address}', '')::INET)"

accounting_update_query = "\
    UPDATE radacct \
    SET acctupdatetime = NOW(), \
        acctinterval = '%{integer:Acct-Delay-Time}', \
        acctsessiontime = '%{integer:Acct-Session-Time}', \
        acctinputoctets = (('%{integer:Acct-Input-Gigawords}' || '4294967296')::BIGINT) + '%{integer:Acct-Input-Octets}', \
        acctoutputoctets = (('%{integer:Acct-Output-Gigawords}' || '4294967296')::BIGINT) + '%{integer:Acct-Output-Octets}', \
        framedipaddress = NULLIF('%{Framed-IP-Address}', '')::INET \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND nasipaddress = '%{NAS-IP-Address}' \
    AND acctstoptime IS NULL"

accounting_stop_query = "\
    UPDATE radacct \
    SET acctstoptime = TO_TIMESTAMP('%{integer:Event-Timestamp}'), \
        acctsessiontime = '%{integer:Acct-Session-Time}', \
        acctinputoctets = (('%{integer:Acct-Input-Gigawords}' || '4294967296')::BIGINT) + '%{integer:Acct-Input-Octets}', \
        acctoutputoctets = (('%{integer:Acct-Output-Gigawords}' || '4294967296')::BIGINT) + '%{integer:Acct-Output-Octets}', \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        connectinfo_stop = '%{Connect-Info}', \
        framedipaddress = NULLIF('%{Framed-IP-Address}', '')::INET, \
        acctupdatetime = NOW() \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND nasipaddress = '%{NAS-IP-Address}' \
    AND acctstoptime IS NULL"

## Post-Auth logging
post_auth_query = "\
    INSERT INTO radpostauth \
        (username, pass, reply, nasname, nasportid, authdate, class) \
    VALUES \
        ('%{SQL-User-Name}', '%{%{User-Password}:-%{Chap-Password}}', \
         '%{reply:Packet-Type}', '%{NAS-IP-Address}', '%{NAS-Port-Id}', \
         NOW(), '%{reply:Class}')"

## NAS lookup
client_query = "\
    SELECT shortname, nasname, secret, type, server \
    FROM nas \
    WHERE nasname = '%{%{Packet-Src-IP-Address}:-%{NAS-IP-Address}}'"
