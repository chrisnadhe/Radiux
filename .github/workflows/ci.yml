name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Batalkan run lama jika ada push baru ke branch yang sama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "latest"

jobs:

  # ---------------------------------------------------------------------------
  # Lint — ruff check + format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check (linter)
        run: uv run ruff check . --output-format=github

      - name: Run ruff format check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Unit Tests — pytest (tanpa Docker services)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Minimal env vars agar Settings tidak error saat load
      SECRET_KEY: "ci-secret-key-panjang-untuk-testing-di-github-actions"
      POSTGRES_PASSWORD: "ci_password"
      POSTGRES_HOST: "localhost"
      POSTGRES_USER: "radiux_user"
      POSTGRES_DB: "radiux_db"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev)
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ -m "not integration" -v --tb=short

  # ---------------------------------------------------------------------------
  # Integration Tests — pytest dengan Docker services
  # (hanya jalan di push ke main, bukan setiap PR)
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: radiux_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: radiux_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      SECRET_KEY: "ci-secret-key-panjang-untuk-testing-di-github-actions"
      POSTGRES_PASSWORD: "ci_password"
      POSTGRES_HOST: "localhost"
      POSTGRES_USER: "radiux_user"
      POSTGRES_DB: "radiux_db"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Apply FreeRADIUS schema
        run: |
          PGPASSWORD=ci_password psql \
            -h localhost -U radiux_user -d radiux_db \
            -f freeradius/mods-config/sql/main/postgresql/schema.sql

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run integration tests
        run: uv run pytest tests/ -m integration -v --tb=short
